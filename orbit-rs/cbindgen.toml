language = "C"
include_guard = "ORBIT_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not modify. */"
tab_width = 4
style = "both"
usize_is_size_t = true

[export]
include = [
    "OrbitDataCallback",
    "OrbitClosedCallback",
    "OrbitProgressCallback",
]

[fn]
prefix = "ORBIT_API"
args = "horizontal"

[defines]
"feature = default" = "ORBIT_DEFAULT"
